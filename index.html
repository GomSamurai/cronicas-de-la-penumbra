<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crónicas de la Penumbra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'void': '#050505',          // Main background (darker than obsidian)
              'panel': '#121212',         // Card/Panel background
              'panel-border': '#2a2a2a',  // Subtle borders
              'bone': '#e5e5e5',          // High contrast text
              'parchment': '#d4c5a9',     // Normal reading text
              'parchment-dim': '#948c7e', // Secondary text
              'gold': '#c5a059',          // Accents/Highlights
              'gold-dim': '#5c4d2e',      // Borders/Muted accents
              'blood': '#8a1c1c',         // HP bars, deep elements
              'blood-bright': '#ff5555',  // Text alerts (High contrast on dark)
              'sanity': '#4b5c85',        // Sanity color
            },
            fontFamily: {
              serif: ['Cormorant Garamond', 'serif'],
              display: ['Cinzel', 'serif'],
              hand: ['Playfair Display', 'serif'],
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'ember': 'ember-drift 10s linear infinite',
              'damage-flash': 'damageFlash 0.5s ease-out',
              'heartbeat-visual': 'heartbeatVisual 1s ease-in-out infinite',
              'spin-fast': 'spin 0.4s linear infinite',
              'pulse-fast': 'pulse 0.4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'ember-drift': {
                '0%': { opacity: '0', transform: 'translateY(0) translateX(0)' },
                '20%': { opacity: '0.8' },
                '80%': { opacity: '0.4' },
                '100%': { opacity: '0', transform: 'translateY(-60px) translateX(20px)' },
              },
              damageFlash: {
                '0%': { opacity: '0' },
                '10%': { opacity: '0.8' },
                '100%': { opacity: '0' },
              },
              heartbeatVisual: {
                '0%, 100%': { transform: 'scale(1)' },
                '10%': { transform: 'scale(1.02)' },
                '20%': { transform: 'scale(1)' },
                '30%': { transform: 'scale(1.02)' },
                '40%': { transform: 'scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
      
      body {
        background-color: #050505;
        color: #d4c5a9;
      }
      
      /* Subtle noise texture */
      .bg-texture {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      }

      /* Vignette Overlay */
      .bg-vignette {
        background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.4) 70%, #050505 100%);
        pointer-events: none;
      }

      /* Ash/Ember Particles */
      .ash-particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #c5a059;
        border-radius: 50%;
        pointer-events: none;
        animation: ember var(--duration) linear infinite;
        animation-delay: var(--delay);
        opacity: 0;
        box-shadow: 0 0 4px 1px rgba(197, 160, 89, 0.4);
        mix-blend-mode: screen;
      }

      /* Mist/Fog Animations */
      @keyframes mist-drift-1 {
        0% { transform: translate(-10%, -10%) rotate(0deg); opacity: 0.3; }
        50% { transform: translate(5%, 5%) rotate(2deg); opacity: 0.5; }
        100% { transform: translate(-10%, -10%) rotate(0deg); opacity: 0.3; }
      }
      @keyframes mist-drift-2 {
        0% { transform: translate(5%, 10%) rotate(0deg); opacity: 0.2; }
        50% { transform: translate(-10%, -5%) rotate(-2deg); opacity: 0.4; }
        100% { transform: translate(5%, 10%) rotate(0deg); opacity: 0.2; }
      }

      .bg-mist {
         position: absolute;
         top: -50%;
         left: -50%;
         width: 200%;
         height: 200%;
         background: radial-gradient(ellipse at center, rgba(40, 40, 45, 0.4), transparent 60%);
         filter: blur(60px);
         pointer-events: none;
         z-index: 0;
         mix-blend-mode: screen;
      }
      
      .animate-mist-1 { animation: mist-drift-1 45s ease-in-out infinite; }
      .animate-mist-2 { animation: mist-drift-2 60s ease-in-out infinite reverse; }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border: 1px solid #111;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
        border-color: #c5a059;
      }
      
      .drop-cap::first-letter {
        float: left;
        font-family: 'Cinzel', serif;
        font-size: 3.8rem;
        line-height: 0.85;
        padding-right: 12px;
        padding-top: 2px;
        color: #c5a059;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }

      /* --- NEW VISCERAL EFFECTS SYSTEM --- */

      /* 1. Dynamic Chromatic Aberration 
         Uses CSS variable --aberration-amount controlled by React state.
      */
      .dynamic-aberration {
         --red-offset: calc(var(--aberration-amount, 0px) * 1);
         --blue-offset: calc(var(--aberration-amount, 0px) * -1);
         text-shadow: 
            var(--red-offset) 0 rgba(255, 0, 0, 0.4),
            var(--blue-offset) 0 rgba(0, 255, 255, 0.4);
         transition: text-shadow 0.5s ease-out;
      }

      /* 2. Text Instability (The "Faint") 
         Triggered intermittently via class toggle.
      */
      .text-instability {
         animation: text-blur-shake 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      @keyframes text-blur-shake {
         0% { filter: blur(0px); opacity: 1; transform: translate3d(0, 0, 0); }
         20% { filter: blur(0.5px); opacity: 0.9; transform: translate3d(-0.5px, 0.5px, 0); }
         40% { filter: blur(1px); opacity: 0.75; transform: translate3d(0.5px, -0.5px, 0); }
         60% { filter: blur(0.5px); opacity: 0.9; transform: translate3d(-0.5px, 0, 0); }
         100% { filter: blur(0px); opacity: 1; transform: translate3d(0, 0, 0); }
      }

      /* Title Glitch (Kept separate for style) */
      @keyframes chromatic-pulse {
         0% { text-shadow: 2px 0 rgba(255,0,0,0.5), -2px 0 rgba(0,0,255,0.5); }
         50% { text-shadow: 0 2px rgba(255,0,0,0.5), 0 -2px rgba(0,0,255,0.5); }
         100% { text-shadow: 2px 0 rgba(255,0,0,0.5), -2px 0 rgba(0,0,255,0.5); }
      }
      .chromatic-aberration {
         animation: chromatic-pulse 4s infinite linear;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>

</head>
  <body class="bg-void min-h-screen font-serif selection:bg-blood selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
